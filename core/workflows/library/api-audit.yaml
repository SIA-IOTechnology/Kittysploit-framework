id: api-audit
version: "1"
name: API Security Audit
description: >
  API-focused audit — endpoint discovery, CORS, SSRF, injection, and debug leakage on API surfaces.
tags: [api, owasp, audit]
continue_on_failure: true
variables:
  target:
    description: API base URL or hostname
    required: true
  port: "443"
  ssl: "true"
start_step: api_fuzz
steps:
  api_fuzz:
    module: auxiliary/scanner/http/api_fuzzer
    description: API endpoint discovery and fuzzing
    options:
      target: "${target}"
      port: "${port}"
      ssl: "${ssl}"
    on_success: cors
    on_failure: cors
  cors:
    module: auxiliary/scanner/http/cors_misconfig
    description: CORS policy review for API origins
    options:
      target: "${target}"
      port: "${port}"
      ssl: "${ssl}"
    on_success: ssrf
    on_failure: ssrf
  ssrf:
    module: auxiliary/scanner/http/ssrf_scanner
    description: SSRF via API parameters
    options:
      target: "${target}"
      port: "${port}"
      ssl: "${ssl}"
    on_success: sql
    on_failure: sql
  sql:
    module: auxiliary/scanner/http/sql_injection
    description: SQL injection on API parameters
    options:
      target: "${target}"
      port: "${port}"
      ssl: "${ssl}"
    on_success: debug
    on_failure: debug
  debug:
    module: auxiliary/scanner/http/debug_info_leak
    description: Verbose API error and debug endpoints
    options:
      target: "${target}"
      port: "${port}"
      ssl: "${ssl}"
    on_success: null
    on_failure: null
